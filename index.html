<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Hunt AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --primary-red: #a51d16; }
        body, html { margin: 0; padding: 0; font-family: sans-serif; background-color: white; width: 100%; height: 100%; overflow: hidden; }
        
        /* Tutte le pagine sono nascoste di default e occupano tutto lo schermo */
        .page { 
            display: none; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100vw; 
            height: 100vh; 
            background: white;
            z-index: 10;
        }

        img.fullscreen { width: 100%; height: 100%; object-fit: contain; }

        /* SPLASH & LOGIN */
        #splash { display: flex; flex-direction: column; align-items: center; justify-content: space-around; text-align: center; }
        #login { background-color: var(--primary-red); color: white; flex-direction: column; align-items: center; justify-content: center; z-index: 20; }
        .btn-figma { background-color: var(--primary-red); color: white; border: none; padding: 18px 80px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .input-sim { background: rgba(255,255,255,0.2); border-radius: 15px; width: 80%; padding: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.3); }

        /* AR SCREEN: Il model-viewer deve stare sopra tutto quando attivo */
        #ar-screen { z-index: 30; background: #eee; }
        model-viewer { width: 100%; height: 100%; --poster-color: transparent; }

        /* SCHERMATA ARCHIVIO & DETTAGLIO */
        #archive { z-index: 40; }
        #detail { z-index: 50; }
    </style>
</head>
<body>

    <div id="splash" class="page" style="display: flex;">
        <img src="logo.png" style="width: 150px;">
        <h1>Design Hunt</h1>
        <button class="btn-figma" onclick="showPage('login')">Inizia</button>
    </div>

    <div id="login" class="page">
        <h2>Bentornato</h2>
        <div class="input-sim">eleonora.rossi@example.com</div>
        <div class="input-sim">••••••••••••••••</div>
        <button class="btn-figma" style="background: black; margin-top: 50px;" onclick="showPage('ar-screen')">Prossimo ></button>
    </div>

    <div id="ar-screen" class="page">
        <model-viewer 
            src="poltrona_sacco.glb" 
            ios-src="POLTRONA_SACCO.usdz" 
            ar 
            ar-modes="webxr scene-viewer quick-look" 
            camera-controls 
            shadow-intensity="1">
            </model-viewer>
    </div>

    <div id="archive" class="page">
        <img src="archivio_sfondo.png" class="fullscreen">
        <div onclick="showPage('detail')" style="position:absolute; top:58%; left:5%; width:30%; height:20%;"></div>
    </div>

    <div id="detail" class="page">
        <img src="scheda_sacco.png" class="fullscreen">
        <div onclick="showPage('archive')" style="position:absolute; bottom:0; left:40%; width:20%; height:10%;"></div>
    </div>

    <script>
        function showPage(id) {
            // Nascondiamo TUTTO
            document.querySelectorAll('.page').forEach(p => {
                p.style.display = 'none';
            });
            
            // Mostriamo solo la pagina scelta
            const target = document.getElementById(id);
            if (id === 'splash' || id === 'login') {
                target.style.display = 'flex';
            } else {
                target.style.display = 'block';
            }
        }

        // GESTIONE AR
        const modelViewer = document.querySelector("model-viewer");

        modelViewer.addEventListener('ar-status', (event) => {
            // Quando l'utente ESCE dall'AR (clicca la X)
            if(event.detail.status === 'not-presenting') {
                // Aspettiamo un attimo che il visore si chiuda
                setTimeout(() => {
                    alert("Complimenti! La Poltrona Sacco è stata aggiunta alla tua collezione.");
                    showPage('archive');
                }, 500);
            }
        });
    </script>
</body>
</html>
