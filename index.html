<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Design Hunt AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
       <style>
        :root { --primary-red: #a51d16; --bg-gray: #f8f8f8; }
        body, html { margin: 0; padding: 0; font-family: -apple-system, sans-serif; height: 100%; width: 100%; overflow: hidden; background: white; }

        /* GESTIONE SCHERMATE */
        .screen { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; align-items: center; justify-content: center; text-align: center; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; }

        /* 1. SPLASH SCREEN */
        #screen-splash { background-color: white; z-index: 10000; }
        .splash-logo { width: 120px; margin-bottom: 20px; }
        #screen-splash h1 { font-size: 36px; color: var(--primary-red); letter-spacing: -1px; margin: 0; }

        /* 2. LOGIN (SISTEMATO PER CENTRATURA) */
        #screen-login { background-color: var(--primary-red); color: white; padding: 40px 20px; }
        .input-box { 
            background: rgba(255,255,255,0.2); 
            border: 1px solid white; 
            border-radius: 12px; 
            width: 280px; /* Larghezza fissa per non farla scappare */
            padding: 15px; 
            margin: 10px auto; /* Centra perfettamente a destra e sinistra */
            color: white; 
            text-align: left; 
            font-size: 14px; 
            box-sizing: border-box; 
        }

        /* 3. SCHERMATA OGGETTO 3D */
        #screen-3d { background: white; justify-content: flex-start; }
        .header-3d { display: flex; align-items: center; padding: 15px 20px; width: 100%; box-sizing: border-box; }
        .app-logo { width: 40px; margin-right: 15px; }
        model-viewer { width: 100%; height: 70%; background-color: #ffffff; }

        /* 4. ARCHIVIO */
        #screen-archive { background: var(--bg-gray); justify-content: flex-start; padding-top: 40px; }
        .archive-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px; width: 90%; margin: 0 auto; }
        .archive-item { background: white; border-radius: 15px; padding: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
        .archive-item img { width: 100%; border-radius: 10px; }

        /* BOTTONI */
        .btn { border: none; border-radius: 50px; padding: 16px 40px; font-weight: 600; font-size: 16px; cursor: pointer; width: 280px; margin: 20px auto 0; box-sizing: border-box; }
        .btn-white { background: white; color: var(--primary-red); }
        .btn-red { background: var(--primary-red); color: white; }
        .btn-black { background: black; color: white; margin-top: 15px; }

        /* POPUP IPHONE */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9998; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        #iphone-popup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 280px; background: rgba(255,255,255,0.95); 
            border-radius: 20px; padding: 25px; text-align: center; z-index: 9999;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div id="screen-splash" class="screen active">
        <img src="logo.png" alt="Design Hunt Logo" class="splash-logo">
        <h1>Design Hunt</h1>
    </div>

    <div id="screen-login" class="screen">
        <h1 style="font-size: 32px; margin-bottom: 20px;">Bentornato</h1>
        <p>Accedi al tuo account</p>
        <div class="input-box">eleonora.rossi@example.com</div>
        <div class="input-box">••••••••••••••••</div>
        <button class="btn btn-white" onclick="changeScreen('screen-3d')">Accedi</button>
    </div>

    <div id="screen-3d" class="screen">
        <div class="header-3d">
            <img src="logo.png" alt="Logo Icona" class="app-logo">
            <div style="text-align: left;">
                <h3 style="margin: 0; color: #333; font-size: 16px;">Poltrona Sacco</h3>
                <p style="margin: 0; font-size: 12px; color: #666;">Zanotta, 1968</p>
            </div>
        </div>

        <model-viewer id="viewer" 
            src="poltrona_sacco.glb" 
            ios-src="POLTRONA_SACCO.usdz" 
            ar ar-modes="quick-look webxr" 
            camera-controls shadow-intensity="1">
            
            <button slot="ar-button" id="ar-trigger" class="btn btn-red" style="position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); white-space: nowrap;">
                Posiziona e cattura
            </button>
        </model-viewer>
    </div>

    <div id="screen-archive" class="screen">
        <h2 style="margin-top: 20px; color: #333; font-size: 22px;">IL TUO ARCHIVIO</h2>
        <div class="archive-grid">
            <div class="archive-item">
                <img src="sacco.png" 
                     alt="Sacco Catturata" 
                     style="width: 100%; height: 80px; object-fit: contain; border-radius: 10px;">
                <p style="font-size: 10px; font-weight: bold; color: var(--primary-red); margin-top:5px;">CATTURATO</p>
            </div>
            
            <div class="archive-item" style="opacity: 0.2;">
                <div style="height:80px; background:#ccc; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#666;">?</div>
            </div>
            <div class="archive-item" style="opacity: 0.2;">
                <div style="height:80px; background:#ccc; border-radius:8px; display:flex; align-items:center; justify-content:center; color:#666;">?</div>
            </div>
        </div>
        <button class="btn btn-red" onclick="changeScreen('screen-3d')">Torna alla camera</button>
    </div>

    <div id="overlay"></div>
    <div id="iphone-popup">
        <h2 style="margin:0; font-size: 18px; color:var(--primary-red)">Ottimo! 🛋️</h2>
        <p style="font-size: 14px; margin: 10px 0 20px 0; line-height: 1.4;">Complimenti! La poltrona sacco è stata aggiunta alla tua collezione.</p>
        <button class="btn btn-black" onclick="openApp()">Apri nell'app</button>
    </div>

    <script>
        let arStarted = false;

        // Passaggio automatico dalla Splash al Login dopo 2.5 secondi
        window.onload = () => {
            setTimeout(() => {
                changeScreen('screen-login');
            }, 2500);
        };

        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // Monitoraggio AR per iPhone
        document.getElementById('ar-trigger').addEventListener('click', () => {
            arStarted = true;
        });

        // Quando torni dall'AR su iPhone (iOS Quick Look ready)
        window.addEventListener('focus', () => {
            if (arStarted) {
                setTimeout(() => {
                    document.getElementById('overlay').style.display = 'block';
                    document.getElementById('iphone-popup').style.display = 'block';
                    arStarted = false;
                }, 1000); // Ritardo per l'animazione di chiusura di iOS
            }
        });

        function openApp() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('iphone-popup').style.display = 'none';
            changeScreen('screen-archive');
        }
    </script>
</body>
</html>
