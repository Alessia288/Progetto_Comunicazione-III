<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Hunt AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --primary-red: #a51d16; }
        body, html { margin: 0; padding: 0; font-family: sans-serif; overflow: hidden; background-color: white; }
        .page { display: none; width: 100vw; height: 100vh; position: relative; }
        img.fullscreen { width: 100%; height: 100%; object-fit: contain; }

        #splash { display: flex; flex-direction: column; align-items: center; justify-content: space-around; text-align: center; }
        .btn-figma { background-color: var(--primary-red); color: white; border: none; padding: 18px 80px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        #login { background-color: var(--primary-red); color: white; flex-direction: column; align-items: center; justify-content: center; }
        .input-sim { background: rgba(255,255,255,0.2); border-radius: 15px; width: 80%; padding: 15px; margin: 10px 0; border: 1px solid rgba(255,255,255,0.3); }

        #ar-screen { height: 100vh; }
        model-viewer { width: 100%; height: 100%; }
        .capture-btn { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); background: white; border: 2px solid var(--primary-red); border-radius: 50px; padding: 15px 30px; font-weight: bold; z-index: 10; cursor: pointer; }
    </style>
</head>
<body>

    <div id="splash" class="page" style="display: flex;">
        <img src="logo.png" style="width: 150px;">
        <h1>Design Hunt</h1>
        <button class="btn-figma" onclick="showPage('login')">Inizia</button>
    </div>

    <div id="login" class="page">
        <h2>Bentornato</h2>
        <div class="input-sim">eleonora.rossi@example.com</div>
        <div class="input-sim">••••••••••••••••</div>
        <button class="btn-figma" style="background: black; margin-top: 50px;" onclick="showPage('ar-screen')">Prossimo ></button>
    </div>

    <div id="ar-screen" class="page">
        <model-viewer src="poltrona_sacco.glb" ios-src="POLTRONA_SACCO.usdz" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1">
            <button slot="ar-button" class="capture-btn" onclick="captureObject()">🛋️ POSIZIONA E CATTURA</button>
        </model-viewer>
    </div>

    <div id="archive" class="page">
        <img src="archivio_sfondo.png" class="fullscreen">
        <div onclick="showPage('detail')" style="position:absolute; top:58%; left:5%; width:30%; height:20%; cursor:pointer;"></div>
    </div>

    <div id="detail" class="page">
        <img src="scheda_sacco.png" class="fullscreen">
        <div onclick="showPage('archive')" style="position:absolute; bottom:0; left:40%; width:20%; height:10%; cursor:pointer;"></div>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
            const target = document.getElementById(id);
            if(id === 'ar-screen' || id === 'archive' || id === 'detail') {
                target.style.display = 'block';
            } else {
                target.style.display = 'flex';
            }
        }

        function captureObject() {
            alert("Ottimo lavoro! Oggetto salvato nella tua collezione.");
            showPage('archive');
        }
    </script>
</body>
</html>
